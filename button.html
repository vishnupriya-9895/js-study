<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="count()">Click</button>
<p id="count">0</p>
    
</body>
<script>
let c = 0;

function count() {
  c++;
  document.getElementById("count").innerHTML = c;
}
</script>
</html>
